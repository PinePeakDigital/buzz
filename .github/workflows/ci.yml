name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Checkout code (fork)
        if: github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      
      - name: Run go fmt
        run: go fmt ./...
      
      - name: Auto-commit formatting changes
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: 'chore: run go fmt'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -cover

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Post or update building comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const repo = context.repo;
            const prNumber = context.issue.number;
            
            const comment = `## 🔨 Building...
            
            Creating cross-platform binaries for PR #${prNumber}. This may take a few minutes.
            
            - Commit: ${{ github.sha }}
            - Started: ${new Date().toISOString()}
            
            > This comment will be updated when the build completes.`;
            
            // Find existing building or ready comment to update
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
            });
            
            const existingComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              (comment.body.includes('🔨 Building...') || comment.body.includes('🚀 Pre-release Build Ready'))
            );
            
            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build cross-platform binaries
        run: ./scripts/build.sh

      - name: Delete existing pre-release if it exists
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const tagName = `pr-${{ github.event.pull_request.number }}-latest`;
            try {
              // Get the release by tag
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName
              });
              
              console.log(`Found existing release ${release.data.id} for tag ${tagName}, deleting...`);
              
              // Delete the release
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id
              });
              
              console.log(`Deleted release ${release.data.id}`);
              
              // Delete the tag
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`
              });
              
              console.log(`Deleted tag ${tagName}`);
            } catch (error) {
              if (error.status === 404) {
                console.log(`No existing release found for tag ${tagName}, will create new one`);
              } else {
                console.error('Error checking/deleting existing release:', error);
                throw error;
              }
            }

      - name: Create or update pre-release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: pr-${{ github.event.pull_request.number }}-latest
          name: "PR #${{ github.event.pull_request.number }} - Latest Build"
          body: |
            **Automated PR Build**
            
            - PR: #${{ github.event.pull_request.number }}
            - Commit: ${{ github.sha }}
            - Built: ${{ github.event.repository.updated_at }}
            
            This is a pre-release build for testing purposes. Install using the `bin` command - see PR comment for instructions.
          draft: false
          prerelease: true
          make_latest: false
          files: |
            buzz-linux-amd64
            buzz-linux-arm64
            buzz-darwin-amd64
            buzz-darwin-arm64
            buzz-windows-amd64.exe
            buzz-windows-arm64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post or update ready comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const repo = context.repo;
            const prNumber = context.issue.number;
            const tagName = `pr-${prNumber}-latest`;
            const releaseUrl = `https://github.com/${repo.owner}/${repo.repo}/releases/tag/${tagName}`;
            
            const comment = `## 🚀 Pre-release Build Ready
            
            Test builds are ready! Install directly using the \`bin\` command:
            
            \`\`\`bash
            # Install the pre-release
            bin install ${releaseUrl} buzz-pr-${prNumber}
            \`\`\`
            
            \`\`\`bash
            # Run the pre-release
            buzz-pr-${prNumber}
            \`\`\`
            
            \`\`\`bash
            # Uninstall the pre-release
            bin remove buzz-pr-${prNumber}
            \`\`\`
            
            ### Direct Download Links
            
            Or download binaries directly from the [pre-release page](${releaseUrl}):
            
            - [Linux AMD64](https://github.com/${repo.owner}/${repo.repo}/releases/download/${tagName}/buzz-linux-amd64)
            - [Linux ARM64](https://github.com/${repo.owner}/${repo.repo}/releases/download/${tagName}/buzz-linux-arm64)
            - [macOS Intel](https://github.com/${repo.owner}/${repo.repo}/releases/download/${tagName}/buzz-darwin-amd64)
            - [macOS Apple Silicon](https://github.com/${repo.owner}/${repo.repo}/releases/download/${tagName}/buzz-darwin-arm64)
            - [Windows AMD64](https://github.com/${repo.owner}/${repo.repo}/releases/download/${tagName}/buzz-windows-amd64.exe)
            - [Windows ARM64](https://github.com/${repo.owner}/${repo.repo}/releases/download/${tagName}/buzz-windows-arm64.exe)
            
            > 💡 No GitHub login required for downloads!
            > 
            > 🗑️ This pre-release will be automatically deleted when the PR is closed.`;
            
            // Find existing building or ready comment to update
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
            });
            
            const existingComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              (comment.body.includes('🔨 Building...') || comment.body.includes('🚀 Pre-release Build Ready'))
            );
            
            if (existingComment) {
              // Update existing comment with the final status
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              // Create new comment if no existing comment found
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }

  demo:
    runs-on: ubuntu-latest
    needs: build
    # This job builds and runs the PR's code (record.sh compiles buzz and the
    # mock server) in a job that holds a write token, so restrict it to
    # same-repo PRs — i.e. trusted collaborator branches. Fork PRs don't run it
    # at all, so untrusted code never executes alongside a writable token.
    if: github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: write # upload the demo GIF to the PR pre-release
      pull-requests: write # post/update the demo comment

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # This job builds and runs PR code; don't leave the token in
          # .git/config where a build step could read it. The publish steps use
          # GH_TOKEN / the github-script token, not git credentials.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install VHS and dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # ffmpeg from Ubuntu's signed apt repo (also preinstalled on runners).
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          # VHS and ttyd: download pinned release binaries and verify their
          # SHA256 before installing. We install these ourselves rather than via
          # charmbracelet/vhs-action, whose ffmpeg installer pins a stale
          # FFmpeg-Builds asset name and fails. Bump these pins deliberately.
          VHS_VERSION=v0.11.0
          VHS_SHA256=99cb634587eaae0473c1ea377db80c3a048c27f99fe0a7febb1a1e8cb7ee5009
          TTYD_VERSION=1.7.7
          TTYD_SHA256=8a217c968aba172e0dbf3f34447218dc015bc4d5e59bf51db2f2cd12b7be4f55
          gh release download "$VHS_VERSION" --repo charmbracelet/vhs --pattern 'vhs_*_Linux_x86_64.tar.gz' --output vhs.tar.gz
          echo "${VHS_SHA256}  vhs.tar.gz" | sha256sum -c -
          mkdir -p vhs_extract && tar -xzf vhs.tar.gz -C vhs_extract
          sudo install -m 0755 "$(find vhs_extract -type f -name vhs | head -n1)" /usr/local/bin/vhs
          gh release download "$TTYD_VERSION" --repo tsl0922/ttyd --pattern 'ttyd.x86_64' --output ttyd
          echo "${TTYD_SHA256}  ttyd" | sha256sum -c -
          sudo install -m 0755 ttyd /usr/local/bin/ttyd
          rm -rf vhs.tar.gz vhs_extract ttyd

      - name: Record demo GIF
        run: ./scripts/demo/record.sh

      - name: Upload demo GIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: demo-gif
          path: scripts/demo/demo.gif

      - name: Attach demo GIF to PR pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh release upload "pr-${PR_NUMBER}-latest" scripts/demo/demo.gif --clobber

      - name: Post or update demo comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const repo = context.repo;
            const prNumber = context.issue.number;
            const tagName = `pr-${prNumber}-latest`;
            const gifUrl = `https://github.com/${repo.owner}/${repo.repo}/releases/download/${tagName}/demo.gif`;

            const comment = `## 🎬 Demo\n\n`
              + `Recorded from this PR's build (fictional data):\n\n`
              + `![buzz demo](${gifUrl})\n\n`
              + `> Regenerated on each push to this PR.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## 🎬 Demo')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: existing.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: comment,
              });
            }
